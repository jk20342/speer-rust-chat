name: publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: run publish checks without uploading
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  SPEER_SOURCE_DIR: ${{ github.workspace }}/speer-src

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: checkout speer-chat
        uses: actions/checkout@v4
        with:
          path: speer-chat

      - name: checkout speer
        uses: actions/checkout@v4
        with:
          repository: jk20342/speer-rust
          path: speer

      - name: checkout speer-sys
        uses: actions/checkout@v4
        with:
          repository: jk20342/speer-sys-rust
          path: speer-sys

      - name: checkout speer c source
        uses: actions/checkout@v4
        with:
          repository: jk20342/speer
          path: speer-src

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev pkg-config

      - name: publish dry run
        if: ${{ inputs.dry_run == 'true' }}
        working-directory: speer-chat
        run: cargo publish --dry-run

      - name: publish
        if: ${{ inputs.dry_run == 'false' }}
        working-directory: speer-chat
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
